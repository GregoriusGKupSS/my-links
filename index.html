<!DOCTYPE html>
<html>
<head>
    <title>Grego links tree</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #111;
            color: white;
            margin: 0;
            padding: 20px;
            /* Konten akan di atas video */
            position: relative;
            z-index: 1;
        }
        /* Fullscreen video background */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: -1;
            pointer-events: none;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
        }
        .btn {
            display: block;
            margin: 10px auto;
            padding: 15px;
            max-width: 200px;
            width: 80%;
            background: #00ffcc;
            color: black;
            text-decoration: none;
            border-radius: 10px;
            font-size: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.35);
            background: #00e6b3;
        }
        @media (max-width: 600px) {
            .profile-img {
                width: 80px;
                height: 80px;
            }
            .btn {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Video latar belakang (letakkan file video di samping HTML ini) -->
    <video id="bg-video" autoplay muted loop playsinline>
        <source src="" type="video/mp4">
        <source src="background.webm" type="video/webm">
    </video>
    
    <img src="walpaper_LEON4.jpg" alt="Profile Picture" class="profile-img">
    <h1>Gregorius</h1>
    <p>welcome to my links tree!</p>
    <a class="btn" href="https://instagram.com/gogoriusnes">Instagram</a>
    <a class="btn" href="https://www.tiktok.com/@grego_k1?_r=1&_t=ZS-94lcsNNwgLN">Tik Tok</a>
    <a class="btn" href="https://discord.com/users/gregoriusgalen">Discord</a>
</body>
</html>
